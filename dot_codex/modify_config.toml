{{- /* chezmoi:modify-template */ -}}
# chezmoi-managed:start
"$schema" = "https://developers.openai.com/codex/config-schema.json"
model = "gpt-5.5"
model_reasoning_effort = "high"
plan_mode_reasoning_effort = "xhigh"
service_tier = "fast"
web_search = "live"
personality = "pragmatic"
file_opener = "cursor"
suppress_unstable_features_warning = true
approvals_reviewer = "auto_review"

[features]
prevent_idle_sleep = true
memories = true
image_generation = true

[sandbox_workspace_write]
network_access = true
writable_roots = ["~/.npm", "~/Library/pnpm", "~/Library/Caches", "~/.cache", "~/.local/state/mise", "~/.local/share/mise"]

[tui]
status_line = ["project-root", "git-branch", "context-remaining", "used-tokens", "total-input-tokens", "total-output-tokens"]

[notice]
hide_full_access_warning = true
hide_rate_limit_model_nudge = true

[agents]
max_threads = 24
max_depth = 4

[agents.explorer]
description = "Use `explorer` for specific codebase questions."
config_file = "./agents/explorer.toml"

[agents.worker]
description = "Use for execution and production work."
config_file = "./agents/worker.toml"

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp/oauth"

[plugins."github@openai-curated"]
enabled = true

[plugins."figma@openai-curated"]
enabled = true
# chezmoi-managed:end

{{- .chezmoi.stdin | replaceAllRegex "(?s)^# chezmoi-managed:start.*?# chezmoi-managed:end\n*" "\n\n" -}}
